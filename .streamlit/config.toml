[theme]
# 팔란티어 스타일의 핵심: 눈의 피로를 줄이는 짙은 회색 배경과 선명한 강조색
primaryColor = "#00FF41"       # '터미널 그린' (시인성이 가장 좋음)
backgroundColor = "#121212"    # 짙은 다크 그레이 배경
secondaryBackgroundColor = "#1E1E1E" # 컨테이너(카드) 배경
textColor = "#E0E0E0"          # 완전한 흰색보다 살짝 부드러운 회색 텍스트

# 폰트: 시스템 기본 sans serif를 사용하되, 
# 데이터 가독성을 위해 고정폭 글꼴(monospace)이 필요하다면 아래를 추천
font = "sans serif"