[theme]
base = "dark"
primaryColor = "#4F8CFF"
backgroundColor = "#0A0E14"
secondaryBackgroundColor = "#131922"
textColor = "#E7EDF5"
font = "sans-serif"
baseRadius = "large"
showWidgetBorder = true
borderColor = "#223140"
dataframeBorderColor = "#223140"
dataframeHeaderBackgroundColor = "#0F151D"
chartCategoricalColors = ["#4F8CFF", "#38BDF8", "#34D399", "#FBBF24", "#F87171", "#A78BFA"]

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
